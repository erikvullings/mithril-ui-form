name: Release

on:
  push:
    branches:
      - master
      - main
      - beta
      - rc
      - alpha

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.10.0"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Capture package version before release
        id: before_release
        working-directory: packages/mithril-ui-form
        run: echo "version=$(node -e 'console.log(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Release mithril-ui-form (main package)
        working-directory: packages/mithril-ui-form
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release

      - name: Capture package version after release
        id: after_release
        working-directory: packages/mithril-ui-form
        run: echo "version=$(node -e 'console.log(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Publish to npm with pnpm
        working-directory: packages/mithril-ui-form
        if: success() && steps.before_release.outputs.version != steps.after_release.outputs.version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks

      - name: Skip publish (no new release)
        if: success() && steps.before_release.outputs.version == steps.after_release.outputs.version
        run: echo "No semantic-release version bump detected; skipping npm publish."
